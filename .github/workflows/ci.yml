name: CI

on:
  push:
    branches: main
    paths-ignore:
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - 'LICENSE'
      - 'README.md'
      - 'action.yml'
  pull_request:
    branches: main
    paths-ignore:
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - 'LICENSE'
      - 'README.md'
      - 'action.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1,5'

env:
  # Match with docker image
  PYTHON_VERSION: "3.12"
  DOCKER_IMAGE: ${{ github.repository }}

jobs:
  ci:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ci-${{ matrix.platform }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
        # 7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

        # 6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        # 7.2.0
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b
        with:
          version: "0.9.21"
          enable-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Install python dependencies
        run: uv sync --all-extras --all-groups --frozen --allow-python-downloads

      - name: Check code formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check --output-format=github

      - name: Check python types
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest -vvv

  docker:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: amd64
          - os: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{matrix.os}}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    concurrency:
      group: ${{ matrix.platform }}-docker_build
      cancel-in-progress: true
    steps:
        # 7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 4.1.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build the test image
        # 7.2.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          target: test
          platforms: linux/${{ matrix.platform }}
          load: true
          tags: submission-checker:test
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: docker run --rm submission-checker:test

      - name: Login to ghcr.io
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        # 4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        # 7.2.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.platform }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}-${{ matrix.platform }}
            ghcr.io/${{ env.DOCKER_IMAGE }}:latest-${{ matrix.platform }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=ssh://git@github.com:${{ github.repository }}.git
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

  docker-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        # 4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create \
            ghcr.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            --amend ghcr.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}-amd64 \
            --amend ghcr.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}-arm64

          docker manifest push ghcr.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}

          docker manifest create \
            ghcr.io/${{ env.DOCKER_IMAGE }}:latest \
            --amend ghcr.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}-amd64 \
            --amend ghcr.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}-arm64

          docker manifest push ghcr.io/${{ env.DOCKER_IMAGE }}:latest
